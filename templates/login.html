{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--accent-purple);"></i>
                    <h2 class="section-title mt-3">Welcome Back</h2>
                    <p class="text-secondary">Log in to your StressAI account</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                    <div class="mb-3">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" class="form-control form-control-glass" id="email"
                               name="email" value="{{ email if email else '' }}" placeholder="you@example.com" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" class="form-control form-control-glass" id="password"
                               name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-gradient w-100" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right"></i> Log In
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-secondary">Don't have an account?</span>
                    <a href="{{ url_for('register') }}" class="text-decoration-none" style="color: var(--accent-blue);">
                        Register here
                    </a>
                </div>

                <div class="text-center mt-3 p-3 rounded-3" style="background: rgba(99,102,241,0.05); border: 1px solid rgba(99,102,241,0.1);">
                    <small class="text-secondary">
                        <i class="bi bi-info-circle"></i>
                        Default admin: <code>admin@stress.ai</code> / <code>Admin123</code>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
